{% extends "base.html" %}

{% block content %}
<h2>Update Reservation</h2>

{% if reservation %}
<section class="form-section">
    <form method="POST">
        <label>Reservation ID</label>
        <input type="number" value="{{ reservation.RES_ID }}" disabled>

        <label>Customer</label>
        <select name="customer_id" required>
            {% for customer in customers %}
            <option value="{{ customer.CUSTOMER_ID }}"
                {% if customer.CUSTOMER_ID == reservation.CUSTOMER_ID %}selected{% endif %}>
                {{ customer.CUSTOMER_ID }} - {{ customer.FIRSTNAME }} {{ customer.LASTNAME }}
            </option>
            {% endfor %}
        </select>

        <label>Table</label>
        <select name="table_id" required>
            {% for table in tables %}
            <option value="{{ table.TABLE_ID }}"
                {% if table.TABLE_ID == reservation.TABLE_ID %}selected{% endif %}>
                Table {{ table.TABLENUM }} (Capacity: {{ table.CAPACITY }})
            </option>
            {% endfor %}
        </select>

        <label>Start Time</label>
        <input type="datetime-local" name="start_time" value="{{ reservation.START_TIME_STR }}" required>

        <label>End Time</label>
        <input type="datetime-local" name="end_time" value="{{ reservation.END_TIME_STR }}" required>

        <label>Party Size</label>
        <input type="number" name="party_size" min="1" value="{{ reservation.PARTY_SIZE }}" required>

        <label>Status</label>
        <select name="status" required>
            <option value="booked" {% if reservation.STATUS == 'booked' %}selected{% endif %}>booked</option>
            <option value="completed" {% if reservation.STATUS == 'completed' %}selected{% endif %}>completed</option>
            <option value="cancelled" {% if reservation.STATUS == 'cancelled' %}selected{% endif %}>cancelled</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>
</section>
{% else %}
<p>Reservation not found.</p>
{% endif %}
{% endblock %}
